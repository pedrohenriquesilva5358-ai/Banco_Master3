<!DOCTYPE html>
<html>
<head>
    <title>Banco Master</title>
    <style>
        body {
            background: #8A05BE;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #8A05BE;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>💜 Banco Master</h2>

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button>Entrar</button>
    </form>
</div>

</body>
</html>
